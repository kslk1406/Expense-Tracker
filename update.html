<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Updating Expense Tracker…</title>
<style>
body{font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f8fafc;color:#1e293b;text-align:center;padding:1.5rem}
p{font-size:1.1rem;line-height:1.5}
a{color:#4f46e5}
</style>
</head>
<body>
<p id="msg">Clearing old cache…</p>
<script>
(function() {
  function done() {
    document.getElementById('msg').innerHTML =
      'Done! <a href="/">Open Expense Tracker</a><br><br>If it still looks old, delete the home-screen icon and add it again from Safari/Chrome.';
    window.location.replace('/');
  }
  var steps = [];
  if ('serviceWorker' in navigator) {
    steps.push(navigator.serviceWorker.getRegistrations().then(function(regs) {
      return Promise.all(regs.map(function(r) { return r.unregister(); }));
    }));
  }
  if (window.caches) {
    steps.push(caches.keys().then(function(keys) {
      return Promise.all(keys.map(function(k) { return caches.delete(k); }));
    }));
  }
  Promise.all(steps).then(done).catch(done);
})();
</script>
</body>
</html>
