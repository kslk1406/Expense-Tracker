<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="container">
    <header>
      <button class="hamburger" id="menuToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <h1>Expense Tracker</h1>
      <p id="currentMonth"></p>
    </header>

    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">Menu</div>
      <button class="sidebar-link active" data-tab="add">Add Expense</button>
      <button class="sidebar-link" data-tab="history">History</button>
      <button class="sidebar-link" data-tab="summary">Summary</button>
    </nav>

    <div class="tabs">
      <button class="tab active" data-tab="add">Add</button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="summary">Summary</button>
    </div>

    <div id="add" class="tab-content active">
      <form id="expenseForm">
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" required>
        </div>
        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input type="number" id="amount" step="0.01" min="0" placeholder="0.00" required>
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" required>
            <option value="">Select category</option>
            <option value="Food & Dining">Food & Dining</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills & Utilities">Bills & Utilities</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
            <option value="Education">Education</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="paymentMode">Payment Mode</label>
          <select id="paymentMode" required>
            <option value="">Select payment mode</option>
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
            <option value="Credit Card">Credit Card</option>
            <option value="Debit Card">Debit Card</option>
            <option value="Net Banking">Net Banking</option>
            <option value="Wallet">Wallet</option>
          </select>
        </div>
        <div class="form-group">
          <label for="note">Note (optional)</label>
          <input type="text" id="note" placeholder="What was this for?">
        </div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="isRecurring">
            <span>Recurring expense</span>
          </label>
          <select id="frequency" disabled>
            <option value="monthly">Monthly</option>
            <option value="weekly">Weekly</option>
            <option value="yearly">Yearly</option>
          </select>
        </div>
        <button type="submit" class="btn-primary">Add Expense</button>
      </form>
    </div>

    <div id="history" class="tab-content">
      <div class="filter-row">
        <select id="filterCategory">
          <option value="">All Categories</option>
          <option value="Food & Dining">Food & Dining</option>
          <option value="Transport">Transport</option>
          <option value="Shopping">Shopping</option>
          <option value="Bills & Utilities">Bills & Utilities</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Health">Health</option>
          <option value="Education">Education</option>
          <option value="Other">Other</option>
        </select>
        <select id="filterMonth"></select>
      </div>
      <div id="expenseList"></div>
      <div id="historyTotal" class="total-bar" style="display:none"></div>
    </div>

    <div id="summary" class="tab-content">
      <div class="summary-month-nav">
        <button id="prevMonth" class="nav-btn" aria-label="Previous month">&larr;</button>
        <span id="summaryMonthLabel"></span>
        <button id="nextMonth" class="nav-btn" aria-label="Next month">&rarr;</button>
      </div>
      <div id="summaryCards"></div>
      <div id="summaryTotal" class="total-bar"></div>
      <div id="donutChart" class="chart-container"></div>
      <div id="dailyChart" class="chart-container"></div>
      <div id="trendChart" class="chart-container"></div>
      <div id="paymentSummary" class="payment-summary"></div>
    </div>

    <div id="toast" class="toast"></div>
  </div>

  <script>
  (function() {
    var expenses = [];
    var summaryDate = new Date();

    function localGetAll() { return JSON.parse(localStorage.getItem('expenses') || '[]'); }
    function localSave(data) { localStorage.setItem('expenses', JSON.stringify(data)); }
    function localAdd(expense) {
      var all = localGetAll();
      expense.id = crypto.randomUUID();
      expense.created_at = new Date().toISOString();
      all.push(expense);
      localSave(all);
      return expense;
    }
    function localDelete(id) {
      var all = localGetAll().filter(function(e) { return e.id !== id; });
      localSave(all);
    }
    function getDeletedRecurring() { return JSON.parse(localStorage.getItem('deleted_recurring') || '[]'); }

    function fetchExpenses() { return localGetAll().sort(function(a, b) { return b.date.localeCompare(a.date); }); }
    function addExpense(expense) { return localAdd(expense); }

    function formatDate(dateStr) { return new Date(dateStr).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }); }
    function formatNum(n) { return n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function escapeHtml(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
    function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 2000); }

    // DELETE - exposed globally
    window._del = function(id) {
      var all = localGetAll();
      var exp = null;
      for (var i = 0; i < all.length; i++) { if (all[i].id === id) { exp = all[i]; break; } }
      if (!exp) return;
      if (exp.is_recurring) {
        var updated = all.filter(function(e) { return e.recurring_id !== id && e.id !== id; });
        localSave(updated);
        expenses = updated;
      } else {
        localDelete(id);
        expenses = expenses.filter(function(e) { return e.id !== id; });
      }
      renderHistory();
      showToast('Deleted');
    };

    function renderHistory() {
      var cat = document.getElementById('filterCategory').value;
      var monthVal = document.getElementById('filterMonth').value;
      var now = new Date();
      var filtered = expenses.filter(function(e) {
        if (cat && e.category !== cat) return false;
        if (monthVal && monthVal !== 'all') {
          var d = new Date(e.date);
          return (d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0')) === monthVal;
        }
        if (!monthVal) {
          var d = new Date(e.date);
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }
        return true;
      });
      var list = document.getElementById('expenseList');
      var totalBar = document.getElementById('historyTotal');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>No expenses found</p></div>';
        totalBar.style.display = 'none';
        return;
      }
      var html = '';
      for (var i = 0; i < filtered.length; i++) {
        var e = filtered[i];
        var badge = e.is_recurring ? '<span class="recurring-badge">' + (e.frequency || 'monthly') + '</span>' : e.recurring_id ? '<span class="recurring-badge">auto</span>' : '';
        html += '<div class="expense-item"><div class="expense-info"><div class="expense-category">' + escapeHtml(e.category) + badge + '</div><div class="expense-meta">' + formatDate(e.date) + ' &middot; ' + escapeHtml(e.payment_mode) + (e.note ? ' &middot; ' + escapeHtml(e.note) : '') + '</div></div><div class="expense-right"><div class="expense-amount">&rupee;' + formatNum(e.amount) + '</div><button class="expense-delete" data-id="' + e.id + '">✕</button></div></div>';
      }
      list.innerHTML = html;
      var total = 0;
      for (var j = 0; j < filtered.length; j++) total += filtered[j].amount;
      totalBar.textContent = 'Total: ₹' + formatNum(total);
      totalBar.style.display = 'block';
    }

    function populateMonthFilter() {
      var select = document.getElementById('filterMonth');
      var current = select.value;
      var months = {};
      for (var i = 0; i < expenses.length; i++) {
        var d = new Date(expenses[i].date);
        months[d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0')] = true;
      }
      var sorted = Object.keys(months).sort().reverse();
      var now = new Date();
      var thisMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
      select.innerHTML = '<option value="">This Month</option><option value="all">All Time</option>';
      for (var j = 0; j < sorted.length; j++) {
        if (sorted[j] === thisMonth) continue;
        var parts = sorted[j].split('-');
        var label = new Date(parts[0], parts[1] - 1).toLocaleString('default', { month: 'short', year: 'numeric' });
        select.innerHTML += '<option value="' + sorted[j] + '">' + label + '</option>';
      }
      if (current) {
        for (var k = 0; k < select.options.length; k++) {
          if (select.options[k].value === current) { select.value = current; break; }
        }
      }
    }

    function getPeriodKey(date, frequency) {
      var d = new Date(date);
      if (frequency === 'weekly') { var s = new Date(d); s.setDate(d.getDate() - d.getDay()); return 'w' + s.toISOString().slice(0, 10); }
      if (frequency === 'yearly') return 'y' + d.getFullYear();
      return 'm' + d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    }

    function generateRecurringExpenses() {
      var now = new Date();
      var templates = expenses.filter(function(e) { return e.is_recurring; });
      if (templates.length === 0) return;
      var deleted = getDeletedRecurring();
      var changed = false;
      for (var t = 0; t < templates.length; t++) {
        var tpl = templates[t];
        var freq = tpl.frequency || 'monthly';
        var tplPeriod = getPeriodKey(tpl.date, freq);
        var currentPeriod = getPeriodKey(now, freq);
        if (tplPeriod === currentPeriod) continue;
        var wasDeleted = false;
        for (var d = 0; d < deleted.length; d++) {
          if (deleted[d].templateId === tpl.id && deleted[d].periodKey === currentPeriod) { wasDeleted = true; break; }
        }
        if (wasDeleted) continue;
        var instances = expenses.filter(function(e) { return e.recurring_id === tpl.id; });
        var alreadyGen = false;
        for (var k = 0; k < instances.length; k++) {
          if (getPeriodKey(instances[k].date, freq) === currentPeriod) { alreadyGen = true; break; }
        }
        if (alreadyGen) continue;
        var nextDate;
        if (freq === 'weekly') { nextDate = new Date(now); nextDate.setDate(now.getDate() - now.getDay()); }
        else if (freq === 'yearly') { nextDate = new Date(now.getFullYear(), new Date(tpl.date).getMonth(), new Date(tpl.date).getDate()); }
        else { nextDate = new Date(now.getFullYear(), now.getMonth(), new Date(tpl.date).getDate()); }
        if (nextDate > now) {
          if (freq === 'monthly') nextDate.setMonth(nextDate.getMonth() - 1);
          else if (freq === 'yearly') nextDate.setFullYear(nextDate.getFullYear() - 1);
          else nextDate.setDate(nextDate.getDate() - 7);
        }
        addExpense({
          date: nextDate.toISOString().slice(0, 10), amount: tpl.amount, category: tpl.category,
          payment_mode: tpl.payment_mode, note: tpl.note, is_recurring: false, frequency: null, recurring_id: tpl.id
        });
        changed = true;
      }
      if (changed) { expenses = fetchExpenses(); populateMonthFilter(); renderHistory(); }
    }

    // Charts
    var COLORS = ['#4f46e5', '#f59e0b', '#10b981', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899', '#84cc16'];

    function renderSummary() {
      var month = summaryDate.getMonth(), year = summaryDate.getFullYear();
      document.getElementById('summaryMonthLabel').textContent = summaryDate.toLocaleString('default', { month: 'long', year: 'numeric' });
      var monthExpenses = expenses.filter(function(e) { var d = new Date(e.date); return d.getMonth() === month && d.getFullYear() === year; });
      var catMap = {};
      for (var i = 0; i < monthExpenses.length; i++) { var c = monthExpenses[i].category; catMap[c] = (catMap[c] || 0) + monthExpenses[i].amount; }
      var maxCat = 1; var keys = Object.keys(catMap);
      for (var j = 0; j < keys.length; j++) { if (catMap[keys[j]] > maxCat) maxCat = catMap[keys[j]]; }
      var cards = document.getElementById('summaryCards');
      var categories = keys.map(function(k) { return [k, catMap[k]]; }).sort(function(a, b) { return b[1] - a[1]; });
      if (categories.length === 0) {
        cards.innerHTML = '<div class="empty-state"><p>No expenses this month</p></div>';
        document.getElementById('donutChart').innerHTML = '';
        document.getElementById('dailyChart').innerHTML = '';
        document.getElementById('trendChart').innerHTML = '';
      } else {
        var ch = '';
        for (var k = 0; k < categories.length; k++) {
          ch += '<div class="summary-card"><div style="flex:1;min-width:0"><div class="category-name">' + escapeHtml(categories[k][0]) + '</div><div class="category-bar"><div class="category-bar-fill" style="width:' + (categories[k][1] / maxCat * 100) + '%"></div></div></div><div class="category-amount">₹' + formatNum(categories[k][1]) + '</div></div>';
        }
        cards.innerHTML = ch;
        renderDonutChart(catMap, categories);
        renderDailyChart(monthExpenses, year, month);
        renderTrendChart(year, month);
      }
      var total = 0;
      for (var m = 0; m < monthExpenses.length; m++) total += monthExpenses[m].amount;
      document.getElementById('summaryTotal').textContent = 'Total: ₹' + formatNum(total);
      var payMap = {};
      for (var p = 0; p < monthExpenses.length; p++) { var pm = monthExpenses[p].payment_mode; payMap[pm] = (payMap[pm] || 0) + monthExpenses[p].amount; }
      var payDiv = document.getElementById('paymentSummary');
      var payKeys = Object.keys(payMap);
      if (payKeys.length > 0) {
        payKeys.sort(function(a, b) { return payMap[b] - payMap[a]; });
        var ph = '<h3>Payment Mode Breakdown</h3>';
        for (var q = 0; q < payKeys.length; q++) {
          ph += '<div class="payment-item"><span>' + escapeHtml(payKeys[q]) + '</span><span>₹' + formatNum(payMap[payKeys[q]]) + '</span></div>';
        }
        payDiv.innerHTML = ph;
      } else {
        payDiv.innerHTML = '';
      }
    }

    function renderDonutChart(catMap, categories) {
      var total = 0; for (var i = 0; i < categories.length; i++) total += categories[i][1];
      var cum = 0; var parts = [];
      for (var j = 0; j < categories.length; j++) { var start = cum; cum += (categories[j][1] / total) * 100; parts.push(COLORS[j % COLORS.length] + ' ' + start + '% ' + cum + '%'); }
      var legend = '';
      for (var k = 0; k < categories.length; k++) {
        legend += '<div class="legend-item"><span class="legend-dot" style="background:' + COLORS[k % COLORS.length] + '"></span><span class="legend-name">' + escapeHtml(categories[k][0]) + '</span><span class="legend-value">' + ((categories[k][1] / total) * 100).toFixed(1) + '%</span></div>';
      }
      document.getElementById('donutChart').innerHTML = '<div class="chart-title">Spending by Category</div><div class="donut-wrapper"><div class="donut-ring" style="background:conic-gradient(' + parts.join(', ') + ')"><div class="donut-center" style="width:70px;height:70px;background:var(--card);border-radius:50%"><div class="donut-total">₹' + formatNum(total) + '</div><div class="donut-label">total</div></div></div><div class="donut-legend">' + legend + '</div></div>';
    }

    function renderDailyChart(monthExpenses, year, month) {
      var daysInMonth = new Date(year, month + 1, 0).getDate();
      var dailyMap = {};
      for (var i = 0; i < monthExpenses.length; i++) { var day = new Date(monthExpenses[i].date).getDate(); dailyMap[day] = (dailyMap[day] || 0) + monthExpenses[i].amount; }
      var maxDaily = 1; var dkeys = Object.keys(dailyMap);
      for (var j = 0; j < dkeys.length; j++) { if (dailyMap[dkeys[j]] > maxDaily) maxDaily = dailyMap[dkeys[j]]; }
      var bars = '';
      for (var d = 1; d <= daysInMonth; d++) {
        var amt = dailyMap[d] || 0;
        var h = Math.max((amt / maxDaily) * 75, 1);
        var showLabel = daysInMonth <= 15 ? (d === 1 || d % 3 === 0 || d === daysInMonth) : (d === 1 || d % 7 === 0 || d === daysInMonth);
        bars += '<div class="bar-col"><div class="bar" style="height:' + h + 'px"><div class="bar-tooltip">Day ' + d + ': ₹' + formatNum(amt) + '</div></div>' + (showLabel ? '<span class="bar-label">' + d + '</span>' : '') + '</div>';
      }
      document.getElementById('dailyChart').innerHTML = '<div class="chart-title">Daily Spending</div><div class="bar-chart">' + bars + '</div>';
    }

    function renderTrendChart(currentYear, currentMonth) {
      var months = [];
      for (var i = 5; i >= 0; i--) { var m = currentMonth - i; var y = currentYear; while (m < 0) { m += 12; y--; } months.push({ year: y, month: m }); }
      var monthTotals = months.map(function(o) {
        var total = 0;
        for (var i = 0; i < expenses.length; i++) { var d = new Date(expenses[i].date); if (d.getMonth() === o.month && d.getFullYear() === o.year) total += expenses[i].amount; }
        return { label: new Date(o.year, o.month).toLocaleString('default', { month: 'short' }), total: total };
      });
      var maxTrend = 1;
      for (var j = 0; j < monthTotals.length; j++) { if (monthTotals[j].total > maxTrend) maxTrend = monthTotals[j].total; }
      var th = '<div class="chart-title">6-Month Trend</div>';
      for (var k = 0; k < monthTotals.length; k++) {
        th += '<div class="trend-row"><span class="trend-label">' + monthTotals[k].label + '</span><div class="trend-track"><div class="trend-fill" style="width:' + (monthTotals[k].total / maxTrend * 100) + '%"></div></div><span class="trend-value">₹' + formatNum(monthTotals[k].total) + '</span></div>';
      }
      document.getElementById('trendChart').innerHTML = th;
    }

    // INIT
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('date').valueAsDate = new Date();
      document.getElementById('currentMonth').textContent = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });

      // Tabs + sidebar
      function switchTab(name) {
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.sidebar-link').forEach(function(s) { s.classList.remove('active'); });
        document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
        var tBtn = document.querySelector('.tab[data-tab="' + name + '"]');
        var sBtn = document.querySelector('.sidebar-link[data-tab="' + name + '"]');
        if (tBtn) tBtn.classList.add('active');
        if (sBtn) sBtn.classList.add('active');
        document.getElementById(name).classList.add('active');
        if (name === 'summary') renderSummary();
        if (name === 'history') renderHistory();
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('open');
      }
      document.querySelectorAll('.tab, .sidebar-link').forEach(function(btn) {
        btn.addEventListener('click', function() { switchTab(btn.dataset.tab); });
      });
      document.getElementById('menuToggle').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
      });
      document.getElementById('overlay').addEventListener('click', function() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('open');
      });

      // Recurring toggle
      document.getElementById('isRecurring').addEventListener('change', function(e) {
        document.getElementById('frequency').disabled = !e.target.checked;
      });

      // Form
      document.getElementById('expenseForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var isRecurring = document.getElementById('isRecurring').checked;
        var expense = {
          date: document.getElementById('date').value,
          amount: parseFloat(document.getElementById('amount').value),
          category: document.getElementById('category').value,
          payment_mode: document.getElementById('paymentMode').value,
          note: document.getElementById('note').value.trim() || null,
          is_recurring: isRecurring,
          frequency: isRecurring ? document.getElementById('frequency').value : null
        };
        addExpense(expense);
        e.target.reset();
        document.getElementById('frequency').disabled = true;
        document.getElementById('date').valueAsDate = new Date();
        showToast(isRecurring ? 'Recurring added!' : 'Added!');
        expenses = fetchExpenses();
        populateMonthFilter();
        renderHistory();
      });

      // Filters
      document.getElementById('filterCategory').addEventListener('change', renderHistory);
      document.getElementById('filterMonth').addEventListener('change', renderHistory);

      // Summary nav
      document.getElementById('prevMonth').addEventListener('click', function() { summaryDate.setMonth(summaryDate.getMonth() - 1); renderSummary(); });
      document.getElementById('nextMonth').addEventListener('click', function() { summaryDate.setMonth(summaryDate.getMonth() + 1); renderSummary(); });

      // DELETE - document-level delegation, foolproof
      document.addEventListener('click', function(e) {
        var btn = e.target;
        while (btn && btn !== document) {
          if (btn.classList && btn.classList.contains('expense-delete')) {
            var id = btn.getAttribute('data-id');
            if (id) { window._del(id); return; }
          }
          btn = btn.parentNode;
        }
      });

      // Load data
      expenses = fetchExpenses();
      populateMonthFilter();
      renderHistory();
      generateRecurringExpenses();
    });
  })();
  </script>
</body>
</html>
